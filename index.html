<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Bremcon - Sistema de Comissões</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
font-family:Arial;
background:#0a0a0a;
color:white;
padding:40px;
}

.container{
max-width:600px;
margin:auto;
background:#111;
padding:30px;
border-radius:10px;
}

h1{
text-align:center;
margin-bottom:30px;
}

input,select{
width:100%;
padding:10px;
margin-top:10px;
margin-bottom:20px;
border:none;
border-radius:6px;
}

button{
background:#00c853;
border:none;
padding:14px;
width:100%;
color:white;
font-weight:bold;
border-radius:6px;
cursor:pointer;
font-size:16px;
}

button:hover{
background:#00a843;
}

</style>
</head>

<body>

<div class="container">

<h1>Bremcon - Registrar Venda</h1>

<label>Cliente</label>
<input id="cliente">

<label>Produto (pontos)</label>
<select id="pontos">
<option value="75000">75.000</option>
<option value="150000">150.000</option>
<option value="300000">300.000</option>
<option value="450000">450.000</option>
<option value="600000">600.000</option>
<option value="750000">750.000</option>
<option value="1000000">1.000.000</option>
</select>

<label>Valor do produto (R$)</label>
<input id="valor" type="number">

<label>Parcelas</label>
<input id="parcelas" type="number">

<button onclick="salvarVenda()">Salvar venda</button>

</div>

<script>

const supabase = window.supabase.createClient(
'https://jvkiockkrrferjaxmumc.supabase.co',
'sb_publishable_LlOTC_ImzcH5KI2EZONo5A_IH1M2DSZ'
)

async function salvarVenda(){

let cliente = document.getElementById("cliente").value
let pontos = document.getElementById("pontos").value
let valor = parseFloat(document.getElementById("valor").value)
let parcelas = parseInt(document.getElementById("parcelas").value)

if(!cliente || !valor || !parcelas){
alert("Preencha todos os campos")
return
}

let percentual = 1.4

let comissao = (valor * percentual) / 100

const { data, error } = await supabase
.from('vendas')
.insert([
{
cliente: cliente,
produto_pontos: pontos,
valor_produto: valor,
percentual_comissao: percentual,
valor_comissao_total: comissao,
parcelas: parcelas,
pagamento_confirmado:false
}
])

if(error){

console.log(error)
alert("Erro ao salvar venda")

}else{

alert("Venda salva com sucesso")

document.getElementById("cliente").value=""
document.getElementById("valor").value=""
document.getElementById("parcelas").value=""

}

}

</script>

</body>
</html>
