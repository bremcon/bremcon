<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Bremcon</title>

<style>
body{
font-family:Arial;
background:#0a0a0a;
color:white;
padding:40px;
}

.container{
max-width:500px;
margin:auto;
background:#111;
padding:30px;
border-radius:10px;
}

input{
width:100%;
padding:10px;
margin-top:10px;
margin-bottom:20px;
border:none;
border-radius:5px;
}

button{
background:#00c853;
border:none;
padding:12px;
width:100%;
color:white;
font-weight:bold;
border-radius:6px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="container">

<h1>Bremcon</h1>

<label>Cliente</label>
<input id="cliente">

<label>Valor do produto</label>
<input id="valor">

<button onclick="salvar()">Salvar venda</button>

</div>

<script>

function salvar(){

let cliente = document.getElementById("cliente").value
let valor = document.getElementById("valor").value

alert("Venda registrada\nCliente: " + cliente + "\nValor: " + valor)

}

</script>

</body>
</html>
