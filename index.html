<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Bremcon</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
font-family:Arial;
background:#0a0a0a;
color:white;
padding:40px;
}

.container{
max-width:500px;
margin:auto;
background:#111;
padding:30px;
border-radius:10px;
}

input{
width:100%;
padding:10px;
margin-top:10px;
margin-bottom:20px;
border:none;
border-radius:5px;
}

button{
background:#00c853;
border:none;
padding:12px;
width:100%;
color:white;
font-weight:bold;
border-radius:6px;
cursor:pointer;
}
</style>

</head>

<body>

<div class="container">

<h2>Bremcon</h2>

<input id="cliente" placeholder="Cliente">
<input id="valor" placeholder="Valor">

<button onclick="salvar()">Salvar</button>

</div>

<script>

const supabaseClient = supabase.createClient(
"https://jvkiockkrrferjaxmumc.supabase.co",
"sb_publishable_LlOTC_ImzcH5KI2EZONo5A_IH1M2DSZ"
)

async function salvar(){

let cliente = document.getElementById("cliente").value
let valor = document.getElementById("valor").value

const { error } = await supabaseClient
.from("vendas")
.insert([
{
cliente: cliente,
valor_produto: valor
}
])

if(error){

console.log(error)
alert("Erro")

}else{

alert("Salvo no banco!")

}

}

</script>

</body>
</html>
